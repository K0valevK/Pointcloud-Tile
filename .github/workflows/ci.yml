name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblaszip-dev

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        env:
          REDIS_URL: redis://localhost:6379/0
          CACHE_ENABLED: "true"
        run: pytest tests/ -m "not integration and not slow" --cov=pointcloud_tile --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pointcloud-tile:ci .
